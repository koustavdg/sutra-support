name: ✨ Feature request
description: Suggest an idea or improvement for Sutra
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! Tell us what you'd like and why it'd help.
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature or change.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: What are you trying to do today, and where does Sutra fall short?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Reader
        - Library / browsing
        - Search
        - Servers / connections
        - Sync
        - Other
